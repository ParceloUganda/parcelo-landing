kind = "web"
previewPath = "/dashboard/"
title = "Parcelo Dashboard"
version = "1.0.0"
id = "artifacts/parcelo-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dashboard/" ]
localPort = 19732

[services.development]
run = "pnpm --filter @workspace/parcelo-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parcelo-dashboard", "run", "build" ]
publicDir = "artifacts/parcelo-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19732"
BASE_PATH = "/dashboard/"
