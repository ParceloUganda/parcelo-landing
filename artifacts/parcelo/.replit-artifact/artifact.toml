kind = "web"
previewPath = "/"
title = "Parcelo"
version = "1.0.0"
id = "artifacts/parcelo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24515

[services.development]
run = "pnpm --filter @workspace/parcelo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parcelo", "run", "build" ]
publicDir = "artifacts/parcelo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24515"
BASE_PATH = "/"
